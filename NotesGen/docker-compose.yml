version: '3.8'

services:

  # =========================
  # React Frontend
  # =========================
  frontend:
    build:
      context: ./LinkToNotes
      dockerfile: Dockerfile

    ports:
      - "80:5173"

    depends_on:
      - backend

  # =========================
  # Spring Boot Backend
  # =========================
  backend:
    restart: on-failure

    build:
      context: ./notes
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      # =========================
      # AWS RDS MySQL
      # =========================
      - SPRING_DATASOURCE_URL=jdbc:mysql://database-1.caz6gioscij0.us-east-1.rds.amazonaws.com:3306/Notes?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=12345678

      # =========================
      # JPA Configuration
      # =========================
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

      # =========================
      # Flask Internal API
      # =========================
      - FLASK_API_URL=https://dzhhnw8t-5001.inc1.devtunnels.ms/transcribe

    depends_on:
      - flask-service

  # =========================
  # Python Flask Service
  # =========================
  flask-service:
    build:
      context: .
      dockerfile: Dockerfile.flask

    ports:
      - "5001:5001"
